name: Daily Data Sync

on:
  schedule:
    - cron: "0 0 * * *" # Every day at 00:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Server Repository
        uses: actions/checkout@v4

      - name: Check bilara-data for new commit
        id: check
        shell: bash
        run: |
          set -euo pipefail
          BILARA_HEAD=$(git ls-remote --heads https://github.com/suttacentral/bilara-data.git published | awk '{print $1}')
          echo "new_head=${BILARA_HEAD}" >> "$GITHUB_OUTPUT"

          PREV_COMMIT=""
          if curl -fsL "https://github.com/${{ github.repository }}/releases/latest/download/data.json" -o /tmp/prev-data.json; then
            PREV_COMMIT=$(jq -r '.commit // empty' /tmp/prev-data.json)
            echo "prev_commit=${PREV_COMMIT}" >> "$GITHUB_OUTPUT"
          else
            echo "prev_commit=" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "${PREV_COMMIT}" && "${PREV_COMMIT}" == "${BILARA_HEAD}" ]]; then
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
            echo "No new bilara-data commit; skipping build."
          else
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore legacy from previous release
        if: steps.check.outputs.skip_build != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          if curl -fsL "https://github.com/${{ github.repository }}/releases/latest/download/data.zip" -o /tmp/prev.zip; then
            mkdir -p /tmp/prev
            # Extract legacy and map from previous bundle if present
            bsdtar -xf /tmp/prev.zip -C /tmp/prev bilara-data-published/legacy bilara-data-published/legacy_sutta_map.json || true
            if [ -d /tmp/prev/bilara-data-published/legacy ]; then
              rm -rf data/bilara-data-published/legacy
              mkdir -p data/bilara-data-published
              mv /tmp/prev/bilara-data-published/legacy data/bilara-data-published/
              echo "Restored legacy directory from previous release"
            fi
            if [ -f /tmp/prev/bilara-data-published/legacy_sutta_map.json ]; then
              mkdir -p data/bilara-data-published
              mv /tmp/prev/bilara-data-published/legacy_sutta_map.json data/bilara-data-published/
              echo "Restored legacy_sutta_map.json from previous release"
            fi
          else
            echo "No previous data.zip found; continuing without legacy restore"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
        if: steps.check.outputs.skip_build != 'true'

      - name: Install Dependencies
        run: npm install
        if: steps.check.outputs.skip_build != 'true'

      - name: Run Build Pipeline
        run: node scripts/build_pipeline.js
        env:
          NODE_ENV: production
        if: steps.check.outputs.skip_build != 'true'

      - name: Extract Version Info
        id: vars
        run: |
          VERSION=$(node -e "console.log(require('./public/data.json').commit.substring(0,7))")
          DATE=$(date +'%Y-%m-%d')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT
        if: steps.check.outputs.skip_build != 'true'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success() && steps.check.outputs.skip_build != 'true'
        with:
          tag_name: v${{ steps.vars.outputs.date }}-${{ steps.vars.outputs.version }}
          name: "Sutta Data Update - ${{ steps.vars.outputs.date }} (${{ steps.vars.outputs.version }})"
          body: |
            ### 📦 Daily Sutta Data Bundle
            - **Data Version (Commit)**: `${{ steps.vars.outputs.version }}`
            - **Build Date**: `${{ steps.vars.outputs.date }}`

            This release contains the latest segmented texts from SuttaCentral's `bilara-data` repository.
          files: |
            public/data.zip
            public/data.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep only last 1 release
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 1
          delete_expired_data: 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.check.outputs.skip_build != 'true'
